<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>з»ҷдҪ зҡ„дё“еұһеҝғж„Ҹ</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050204;
            font-family: 'PingFang SC', 'Microsoft YaHei', sans-serif;
            user-select: none;
            -webkit-touch-callout: none;
        }

        #landscape-hint {
            display: none; 
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(5, 2, 4, 0.95);
            z-index: 9999;
            color: #ffd1dc;
            text-align: center;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .phone-icon {
            width: 50px;
            height: 80px;
            border: 3px solid #ffd1dc;
            border-radius: 8px;
            position: relative;
            animation: rotatePhone 2s infinite ease-in-out;
            margin-bottom: 20px;
        }
        .phone-icon::after {
            content: '';
            position: absolute;
            bottom: 6px; left: 50%; transform: translateX(-50%);
            width: 8px; height: 8px;
            border-radius: 50%;
            background-color: #ffd1dc;
        }
        @keyframes rotatePhone {
            0% { transform: rotate(0deg); }
            50% { transform: rotate(-90deg); }
            100% { transform: rotate(0deg); }
        }
        @media screen and (max-width: 768px) and (orientation: portrait) {
            #landscape-hint { display: flex; }
        }

        #loading-text, #overlay-text {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            color: #ffd1dc; 
            letter-spacing: 2px;
            z-index: 10;
            pointer-events: none;
        }
        #loading-text {
            top: 50%;
            font-size: 16px;
            animation: pulse 1.5s infinite;
        }
        #overlay-text {
            bottom: 12%;
            font-size: 15px;
            color: rgba(255, 255, 255, 0.8);
            display: none;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 0.4; }
            50% { opacity: 1; }
        }

        #final-screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('./photo2.jpg'); 
            background-size: cover;
            background-position: center;
            opacity: 0; 
            transition: opacity 5s ease-in-out; 
            z-index: 20;
            pointer-events: none;
        }

        /* рҹҺҖ ж–°еўһпјҡHello Kitty йЈҳиҗҪзү№ж•ҲеұӮ рҹҺҖ */
        #falling-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 30; /* еңЁжүҖжңүеӣҫеұӮжңҖдёҠйқў */
            pointer-events: none; /* дёҚеҪұе“ҚзӮ№еҮ» */
            overflow: hidden;
            display: none; /* еҲқе§Ӣйҡҗи—Ҹ */
        }
        .falling-item {
            position: absolute;
            top: -10vh; /* д»ҺеұҸе№•еӨ–дёҠж–№ејҖе§Ӣ */
            background-image: url('./kitty.png'); /* иҜ»еҸ–дҪ дёӢиҪҪзҡ„kittyеӣҫ */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
            opacity: 0.8;
        }
        /* еқ иҗҪеҠЁз”»пјҡд»ҺдёҠеҲ°дёӢ */
        @keyframes fallDown {
            to { top: 110vh; }
        }
        /* ж‘ҮжӣіеҠЁз”»пјҡе·ҰеҸіжҷғеҠЁе№¶иҮӘиҪ¬пјҢжЁЎд»ҝжЁұиҠұ */
        @keyframes sway {
            0% { transform: translateX(0px) rotate(0deg); }
            50% { transform: translateX(40px) rotate(180deg); }
            100% { transform: translateX(-30px) rotate(360deg); }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>
    
    <div id="landscape-hint">
        <div class="phone-icon"></div>
        <div style="font-size: 16px; letter-spacing: 2px;">дёәдәҶжңҖдҪідҪ“йӘҢпјҢиҜ·е°ҶжүӢжңәжЁӘиҝҮжқҘи§ӮзңӢе“Ұ</div>
    </div>

    <audio id="my-audio" src="./bgm.mp3" loop preload="auto"></audio>

    <div id="loading-text">жӯЈеңЁдёәдҪ жұҮиҒҡжҳҹиҫ°...</div>
    <div id="overlay-text">гҖҗ и§Ұзў°еұҸе№• В· и§ЈејҖжҳҹиҫ° гҖ‘</div>

    <div id="final-screen"></div>
    
    <!-- рҹҺҖ йЈҳиҗҪе®№еҷЁ -->
    <div id="falling-container"></div>

    <script>
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        
        function updateCameraZ() {
            if (window.innerWidth < window.innerHeight) {
                camera.position.z = 65; 
            } else {
                camera.position.z = 45; 
            }
        }
        updateCameraZ();

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        let particles, geometry, material;
        let imagePositions = [], heartPositions = [], currentPositions = [], speeds = [], driftVelocities = [];
        let targetColors = []; 
        let particleCount = 0;
        
        let currentState = 0; 
        let renderCount = 0; 

        const img = new Image();
        const possibleUrls = ['photo.jpg', './photo.jpg', 'photo.JPG', 'photo.png'];
        let tryIndex = 0;

        img.onload = () => {
            document.getElementById('loading-text').style.display = 'none';
            try {
                createParticles(img);
            } catch (e) {
                console.error(e);
            }
        };
        img.onerror = () => {
            tryIndex++;
            if (tryIndex < possibleUrls.length) {
                img.src = possibleUrls[tryIndex];
            } else {
                document.getElementById('loading-text').innerText = "еҠ иҪҪеӨұиҙҘпјҡиҜ·зЎ®и®Өз¬¬дёҖеј з…§зүҮеҗҚдёә photo.jpg";
            }
        }
        img.src = possibleUrls[0];

        function getHeartPoint(scale) {
            while(true) {
                const x = (Math.random() - 0.5) * 3;
                const y = (Math.random() - 0.5) * 3;
                const z = (Math.random() - 0.5) * 3;
                const xx = x*x, yy = y*y, zz = z*z;
                const a = xx + 2.25*yy + zz - 1;
                if (a*a*a - xx*zz*z - 0.1125*yy*zz*z < 0) {
                    return { x: x * scale, y: z * scale, z: y * scale };
                }
            }
        }

        function createParticles(img) {
            const maxW = window.innerWidth < 768 ? 110 : 160; 
            let w = img.width, h = img.height;
            if (w > maxW) { 
                h = Math.floor(h * (maxW / w)); 
                w = maxW; 
            }
            
            const canvas = document.createElement('canvas');
            const ctx = canvas.getContext('2d', { willReadFrequently: true });
            canvas.width = w; 
            canvas.height = h;
            ctx.drawImage(img, 0, 0, w, h);
            const data = ctx.getImageData(0, 0, w, h).data;

            let pixelData = [];
            for(let y = 0; y < h; y++) {
                for(let x = 0; x < w; x++) {
                    const idx = (y * w + x) * 4;
                    if(data[idx+3] > 128) {
                        pixelData.push({
                            x: x, y: y,
                            r: data[idx]/255, g: data[idx+1]/255, b: data[idx+2]/255
                        });
                    }
                }
            }

            for (let i = pixelData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [pixelData[i], pixelData[j]] = [pixelData[j], pixelData[i]];
            }

            particleCount = pixelData.length;
            
            const initialColors = new Float32Array(particleCount * 3);
            targetColors = new Float32Array(particleCount * 3);

            pixelData.forEach((pixel, i) => {
                const i3 = i * 3;
                
                targetColors[i3] = pixel.r;
                targetColors[i3+1] = pixel.g;
                targetColors[i3+2] = pixel.b;

                initialColors[i3] = 1.0; 
                initialColors[i3+1] = 0.75 + Math.random() * 0.15; 
                initialColors[i3+2] = 0.8 + Math.random() * 0.15;  

                imagePositions.push((pixel.x - w/2) * 0.28, -(pixel.y - h/2) * 0.28, 0);
                
                const heartPos = getHeartPoint(15); 
                heartPositions.push(heartPos.x, heartPos.y, heartPos.z);
                
                currentPositions.push(
                    (Math.random() - 0.5) * 400, 
                    (Math.random() - 0.5) * 400, 
                    (Math.random() - 0.5) * 400
                );
                
                speeds.push(0.015 + Math.random() * 0.04);

                const theta = Math.random() * Math.PI * 2;
                const phi = Math.acos((Math.random() * 2) - 1);
                const driftSpeed = Math.random() * 0.15 + 0.05;
                driftVelocities.push(
                    Math.sin(phi) * Math.cos(theta) * driftSpeed,
                    Math.sin(phi) * Math.sin(theta) * driftSpeed + 0.05, 
                    Math.cos(phi) * driftSpeed
                );
            });

            geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(currentPositions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(initialColors, 3));

            material = new THREE.PointsMaterial({
                size: window.innerWidth < 768 ? 0.18 : 0.15, 
                vertexColors: true,
                transparent: true,
                opacity: 0.9,
                depthWrite: false 
            });

            particles = new THREE.Points(geometry, material);
            scene.add(particles);

            renderCount = Math.floor(particleCount * 0.3);
            geometry.setDrawRange(0, renderCount);

            document.getElementById('overlay-text').style.display = 'block';
        }

        // рҹҺҖ з”ҹжҲҗеҚ•дёӘйЈҳиҗҪзҡ„ Kitty
        function createFallingItem() {
            const container = document.getElementById('falling-container');
            const item = document.createElement('div');
            item.classList.add('falling-item');

            // йҡҸжңәеӨ§е°Ҹ (20px - 45px)
            const size = Math.random() * 25 + 20; 
            // йҡҸжңәж°ҙе№ідҪҚзҪ® (0% - 100%)
            const leftPos = Math.random() * 100; 
            // йҡҸжңәдёӢиҗҪж—¶й—ҙ (8з§’ - 14з§’пјҢзј“зј“йЈҳиҗҪ)
            const fallDuration = Math.random() * 6 + 8; 
            // йҡҸжңәж‘Үж‘Ҷж—¶й—ҙ (3з§’ - 6з§’)
            const swayDuration = Math.random() * 3 + 3; 

            item.style.width = `${size}px`;
            item.style.height = `${size}px`;
            item.style.left = `${leftPos}vw`;
            
            // з»‘е®ҡеқ иҗҪе’Ңж‘Үжӣізҡ„еҠЁз”»
            item.style.animation = `fallDown ${fallDuration}s linear forwards, sway ${swayDuration}s ease-in-out infinite alternate`;

            container.appendChild(item);

            // жҺүеҮәеұҸе№•еҗҺиҮӘеҠЁжё…зҗҶеһғеңҫпјҢйҳІжӯўеҚЎйЎҝ
            setTimeout(() => {
                item.remove();
            }, fallDuration * 1000);
        }

        window.addEventListener('pointerdown', (e) => {
            if (window.getComputedStyle(document.getElementById('landscape-hint')).display !== 'none') {
                return;
            }

            if(particleCount === 0) return;

            const audio = document.getElementById('my-audio');
            if (audio.paused) {
                audio.play().catch(e => console.log("жөҸи§ҲеҷЁйҷҗеҲ¶иҮӘеҠЁж’ӯж”ҫ"));
            }

            const overlay = document.getElementById('overlay-text');

            if (currentState === 0) {
                currentState = 1;
                overlay.innerText = "гҖҗ еҶҚж¬Ўи§Ұзў° В· и§ҒиҜҒз»ҡзғӮ гҖ‘";
                overlay.style.opacity = '0'; 
            } else if (currentState === 1) {
                currentState = 2;
                overlay.style.display = 'none'; 
                
                document.getElementById('final-screen').style.opacity = '1';

                // рҹҺҖ ж ёеҝғпјҡиҝӣе…ҘжңҖеҗҺйҳ¶ж®өж—¶пјҢејҖеҗҜжЁұиҠұ/KittyйӣЁ
                document.getElementById('falling-container').style.display = 'block';
                // жҜҸйҡ” 400 жҜ«з§’пјҲ0.4з§’пјүдә§з”ҹдёҖдёӘж–°еӣҫж ҮпјҢеҪўжҲҗиҝһз»өдёҚз»қзҡ„йӣЁ
                setInterval(createFallingItem, 400);
            }
        });

        function animate() {
            requestAnimationFrame(animate);
            
            if(particles) {
                const positions = geometry.attributes.position.array;
                const colorsAttr = geometry.attributes.color.array;
                const time = Date.now() * 0.001; 
                
                particles.rotation.y = Math.sin(time * 0.5) * 0.25; 
                particles.rotation.x = Math.cos(time * 0.4) * 0.08;
                particles.rotation.z = Math.sin(time * 0.35) * 0.06; 
                
                particles.position.x = 0;
                particles.position.y = 0;

                if (currentState === 0) {
                    const pulse = Math.sin(time * 3) * 0.06 + 1; 
                    for(let i = 0; i < renderCount; i++) {
                        const i3 = i * 3;
                        let tx = heartPositions[i3] * pulse;
                        let ty = heartPositions[i3+1] * pulse;
                        let tz = heartPositions[i3+2] * pulse;
                        
                        tx += Math.sin(time * 2 + positions[i3+1]) * 0.2;
                        ty += Math.cos(time * 2 + positions[i3]) * 0.2;

                        positions[i3] += (tx - positions[i3]) * speeds[i];
                        positions[i3+1] += (ty - positions[i3+1]) * speeds[i];
                        positions[i3+2] += (tz - positions[i3+2]) * speeds[i];
                    }
                }
                
                else if (currentState === 1) {
                    if (renderCount < particleCount) {
                        renderCount += Math.ceil(particleCount * 0.012); 
                        if (renderCount > particleCount) renderCount = particleCount;
                        geometry.setDrawRange(0, renderCount);
                    }

                    for(let i = 0; i < renderCount; i++) {
                        const i3 = i * 3;
                        
                        positions[i3] += (imagePositions[i3] - positions[i3]) * speeds[i];
                        positions[i3+1] += (imagePositions[i3+1] - positions[i3+1]) * speeds[i];
                        positions[i3+2] += (imagePositions[i3+2] - positions[i3+2]) * speeds[i];

                        colorsAttr[i3] += (targetColors[i3] - colorsAttr[i3]) * 0.04;
                        colorsAttr[i3+1] += (targetColors[i3+1] - colorsAttr[i3+1]) * 0.04;
                        colorsAttr[i3+2] += (targetColors[i3+2] - colorsAttr[i3+2]) * 0.04;
                    }
                    geometry.attributes.color.needsUpdate = true;

                    if (renderCount >= particleCount * 0.8) {
                        document.getElementById('overlay-text').style.opacity = '1';
                    }
                }

                else if (currentState === 2) {
                    geometry.setDrawRange(0, particleCount);
                    for(let i = 0; i < particleCount; i++) {
                        const i3 = i * 3;
                        positions[i3] += driftVelocities[i3];
                        positions[i3+1] += driftVelocities[i3+1];
                        positions[i3+2] += driftVelocities[i3+2];
                        
                        positions[i3] += Math.sin(time * 3 + positions[i3+1] * 0.1) * 0.08;
                        positions[i3+2] += Math.cos(time * 3 + positions[i3] * 0.1) * 0.08;
                    }
                    
                    if (material.opacity > 0) {
                        material.opacity -= 0.0015;
                    }
                }
                
                geometry.attributes.position.needsUpdate = true;
            }
            
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            updateCameraZ();
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
